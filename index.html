<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>평범한 사이트</title>
    <style>
      body {
        margin: 0;
        font-family: "Malgun Gothic", sans-serif;
        background: #f4f4f4;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .content {
        text-align: center;
        color: #333;
      }
      .content h1 {
        font-size: 2em;
      }
      .content p {
        font-size: 1.1em;
        color: #666;
      }

      #pressBtn {
        margin-top: 20px;
        padding: 14px 32px;
        font-size: 1.1em;
        border: none;
        border-radius: 8px;
        background: #444;
        color: #fff;
        cursor: pointer;
      }
      #pressBtn:hover {
        background: #222;
      }
      #pressBtn:disabled {
        background: #999;
        cursor: default;
      }

      /* 로딩 화면 */
      .loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #fff;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9998;
      }
      .loading.show {
        display: flex;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #ddd;
        border-top: 5px solid #444;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading p {
        margin-top: 16px;
        color: #666;
        font-size: 1em;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      /* 화면 전체를 덮는 오버레이 */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: black;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .overlay.show {
        display: flex;
        animation: flash 0.15s;
      }
      /* 이미지가 화면 전체를 꽉 채우도록 변경 */
      .overlay img {
        width: 100vw;
        height: 100vh;
        object-fit: cover; /* 비율 유지하면서 화면 꽉 채움, 잘림 발생 가능 */
        animation: pop 0.3s ease-out;
      }

      @keyframes flash {
        0% {
          background: white;
        }
        100% {
          background: black;
        }
      }
      @keyframes pop {
        0% {
          transform: scale(0.2);
        }
        60% {
          transform: scale(1.3);
        }
        100% {
          transform: scale(1);
        }
      }

      body.shake {
        animation: shake 0.4s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translate(0, 0);
        }
        20% {
          transform: translate(-10px, 6px);
        }
        40% {
          transform: translate(10px, -6px);
        }
        60% {
          transform: translate(-8px, -8px);
        }
        80% {
          transform: translate(8px, 8px);
        }
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>HELLO?</h1>
      <button id="pressBtn">CLICK</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>로딩 중...</p>
    </div>

    <div class="overlay" id="overlay">
      <img id="popChar" src="images.jpg" />
    </div>

    <audio id="boo" preload="auto">
      <!-- 소리 파일 쓰려면: <source src="boo.mp3" type="audio/mpeg"> -->
    </audio>

    <script>
      // 여러 장 랜덤으로 보여주고 싶으면 파일명을 여기에 추가
      const items = ["images.jpg"];

      document.getElementById("pressBtn").addEventListener("click", () => {
        const btn = document.getElementById("pressBtn");
        const loading = document.getElementById("loading");
        const overlay = document.getElementById("overlay");
        const popChar = document.getElementById("popChar");

        // 버튼 비활성화 + 로딩 화면 표시
        btn.disabled = true;
        loading.classList.add("show");

        // 3초 후 로딩 끄고 깜짝 이미지 표시
        setTimeout(() => {
          loading.classList.remove("show");

          popChar.src = items[Math.floor(Math.random() * items.length)];
          overlay.classList.add("show");
          document.body.classList.add("shake");

          const boo = document.getElementById("boo");
          boo.currentTime = 0;
          boo.play().catch(() => {});

          setTimeout(() => {
            document.body.classList.remove("shake");
          }, 400);

          btn.disabled = false;
        }, 3000);

        // 다시 누르면 닫히게
        overlay.onclick = () => overlay.classList.remove("show");
      });
    </script>
  </body>
</html>
